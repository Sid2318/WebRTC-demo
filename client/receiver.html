<!doctype html>
<html>
  <head>
    <title>WebRTC - Receiver</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background-color: #1a1a1a;
      }
      .container {
        text-align: center;
        background-color: #2a2a2a;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }
      h2 {
        color: #2196f3;
        margin-top: 0;
      }
      video {
        width: 100%;
        max-width: 640px;
        height: auto;
        background-color: #000;
        border-radius: 4px;
        border: 2px solid #2196f3;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>📺 Receiver</h2>
      <video id="remoteVideo" autoplay muted playsinline></video>
      <p style="color: #888; font-size: 12px; margin-top: 10px">
        Incoming camera feed from sender
      </p>
    </div>

    <script src="script.js"></script>
    <script>
      start(false); // receiver
    </script>
  </body>
</html>
